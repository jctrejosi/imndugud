<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Pulse | Traffic Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <style>
        /* Personalización de DataTables para Tailwind */
        .dataTables_wrapper .dataTables_filter input {
            border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 0.5rem 1rem;
            outline: none; transition: all 0.2s; background: white;
        }
        .dataTables_wrapper .dataTables_filter input:focus { border-color: #3b82f6; ring: 2px; }
        table.dataTable.no-footer { border-bottom: 1px solid #f1f5f9; }
        .dataTables_wrapper .dataTables_paginate .paginate_button.current {
            background: #3b82f6 !important; color: white !important; border: none !important; border-radius: 0.5rem;
        }
        pre::-webkit-scrollbar { width: 8px; height: 8px; }
        pre::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">

    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 sticky top-0 z-40">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-200">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-slate-800">API <span class="text-blue-600">Pulse</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div id="status-indicator" class="flex items-center gap-2 text-xs font-semibold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-100">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    LIVE CAPTURE
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/60 border border-slate-200 overflow-hidden">
            <div class="p-6">
                <table id="apiTable" class="w-full text-left text-sm border-separate border-spacing-y-0">
                    <thead class="bg-slate-50 text-slate-500 uppercase text-[10px] font-bold tracking-widest">
                        <tr>
                            <th class="px-4 py-4 border-b border-slate-100">Timestamp</th>
                            <th class="px-4 py-4 border-b border-slate-100">Method</th>
                            <th class="px-4 py-4 border-b border-slate-100">Status</th>
                            <th class="px-4 py-4 border-b border-slate-100">Endpoint</th>
                            <th class="px-4 py-4 border-b border-slate-100 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="detailPanel" class="fixed inset-y-0 right-0 w-full max-w-2xl bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-50 border-l border-slate-200 hidden">
        <div class="h-full flex flex-col">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <div>
                    <h2 class="text-lg font-bold text-slate-800 tracking-tight">Request Details</h2>
                    <p class="text-[10px] text-slate-400 font-mono uppercase mt-1" id="requestIdLabel"></p>
                </div>
                <button onclick="closeDetail()" class="p-2 hover:bg-slate-200 rounded-full transition-colors text-slate-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="p-6 overflow-y-auto flex-1 space-y-6">
                <div id="typeBadges" class="flex flex-wrap gap-2"></div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">API Endpoint</label>
                    <div class="group relative">
                        <p id="modalUrl" class="text-xs font-mono text-blue-700 break-all bg-blue-50/50 p-3 rounded-xl border border-blue-100"></p>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-end">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">Response Body</label>
                        <button onclick="copyToClipboard()" class="text-[10px] font-bold bg-slate-800 text-white px-3 py-1.5 rounded-lg hover:bg-slate-700 active:scale-95 transition-all">
                            COPY JSON
                        </button>
                    </div>
                    <div class="relative group">
                        <pre id="modalContent" class="text-[11px] bg-slate-900 text-emerald-400 p-5 rounded-2xl overflow-x-auto font-mono leading-relaxed border-4 border-slate-800 shadow-inner max-h-[500px]"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="overlay" onclick="closeDetail()" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300"></div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <script>
        let table;

        $(document).ready(function() {
            table = $('#apiTable').DataTable({
                ajax: '/api/traffic',
                columns: [
                    { data: 'hora', className: 'px-4 py-4 text-slate-500 font-mono text-[11px]' },
                    { data: 'method', render: data => {
                        const style = data === 'POST' ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700';
                        return `<span class="px-2 py-1 rounded-md text-[9px] font-black tracking-widest ${style}">${data}</span>`;
                    }},
                    { data: 'status_code', render: data => {
                        const color = data >= 200 && data < 300 ? 'text-emerald-600' : 'text-rose-500';
                        return `<span class="font-bold font-mono ${color}">${data || '---'}</span>`;
                    }},
                    { data: 'url', className: 'px-4 py-4 max-w-[300px] md:max-w-md truncate font-medium text-slate-600', render: data => data },
                    { data: 'id', className: 'text-center', render: data => {
                        return `<button onclick="showDetail('${data}')" class="bg-slate-100 hover:bg-blue-600 hover:text-white text-slate-600 px-3 py-1.5 rounded-lg text-[11px] font-bold transition-all">INSPECT</button>`;
                    }}
                ],
                order: [[0, 'desc']],
                pageLength: 15,
                dom: '<"flex flex-col md:flex-row justify-between p-4 gap-4"f>rt<"flex justify-between p-4 items-center text-xs text-slate-500"ip>',
                language: { search: "", searchPlaceholder: "Filter requests..." }
            });

            // Refresh automático cada 5 segundos
            setInterval(() => table.ajax.reload(null, false), 5000);
        });

        function showDetail(id) {
            const panel = $('#detailPanel');
            const overlay = $('#overlay');
            
            panel.removeClass('hidden');
            overlay.removeClass('hidden');
            
            setTimeout(() => {
                panel.addClass('translate-x-0');
                overlay.addClass('opacity-100');
            }, 10);

            $('#modalContent').text('Loading payload...');
            $('#typeBadges').html('');
            $('#requestIdLabel').text('ID: ' + id);

            $.get('/api/detail/' + id, function(data) {
                $('#modalUrl').text(data.url);
                
                // Generar Badges dinámicos
                let badges = '';
                if (data.meta.is_encrypted) {
                    badges += '<span class="bg-rose-100 text-rose-700 text-[10px] px-3 py-1.5 rounded-full font-black border border-rose-200 uppercase tracking-tighter italic">⚠️ Encrypted / Binary</span>';
                } else if (data.meta.is_json) {
                    badges += '<span class="bg-emerald-100 text-emerald-700 text-[10px] px-3 py-1.5 rounded-full font-black border border-emerald-200 uppercase tracking-tighter">JSON Valid</span>';
                } else {
                    badges += '<span class="bg-slate-100 text-slate-700 text-[10px] px-3 py-1.5 rounded-full font-black border border-slate-200 uppercase tracking-tighter">Raw Text</span>';
                }
                badges += `<span class="bg-blue-50 text-blue-600 text-[10px] px-3 py-1.5 rounded-full font-bold border border-blue-100">${data.meta.length.toLocaleString()} bytes</span>`;
                
                $('#typeBadges').html(badges);

                // Formatear contenido
                if (data.response_body) {
                    $('#modalContent').text(data.response_body);
                } else {
                    $('#modalContent').html('<span class="text-slate-500 italic">// No response body captured</span>');
                }
            });
        }

        function closeDetail() {
            const panel = $('#detailPanel');
            const overlay = $('#overlay');
            
            panel.removeClass('translate-x-0');
            overlay.removeClass('opacity-100');
            
            setTimeout(() => {
                panel.addClass('hidden');
                overlay.addClass('hidden');
            }, 300);
        }

        function copyToClipboard() {
            const text = $('#modalContent').text();
            navigator.clipboard.writeText(text).then(() => {
                alert('Payload copied to clipboard!');
            });
        }
    </script>
</body>
</html>
