<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Traffic Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <style>
        /* Ajustes para que DataTables no rompa el diseño de Tailwind */
        .dataTables_wrapper .dataTables_filter input {
            border: 1px solid #e5e7eb; border-radius: 0.5rem; padding: 0.4rem 1rem; margin-bottom: 1rem;
        }
        table.dataTable.no-footer { border-bottom: 1px solid #e5e7eb; }
        .dataTables_wrapper .dataTables_paginate .paginate_button.current {
            background: #3b82f6 !important; color: white !important; border: none; border-radius: 0.4rem;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-10">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🕵️</span>
                <h1 class="text-xl font-bold tracking-tight text-slate-800">API <span class="text-blue-600">Analyzer</span></h1>
            </div>
            <div id="status-indicator" class="flex items-center gap-2 text-sm text-green-600 font-medium">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                Capturando en vivo
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-sm">Destino de DB</p>
                <p class="font-mono text-xs text-blue-600">/db/traffic.db</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6">
                <table id="apiTable" class="w-full text-left text-sm">
                    <thead class="bg-slate-50 text-slate-600 uppercase text-xs">
                        <tr>
                            <th class="px-4 py-3 border-b">Hora</th>
                            <th class="px-4 py-3 border-b">Método</th>
                            <th class="px-4 py-3 border-b">Status</th>
                            <th class="px-4 py-3 border-b">URL</th>
                            <th class="px-4 py-3 border-b text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="detailPanel" class="fixed inset-y-0 right-0 w-full max-w-2xl bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-50 border-l border-slate-200 hidden">
        <div class="h-full flex flex-col">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h2 class="text-lg font-bold text-slate-800">Detalles de la Petición</h2>
                <button onclick="closeDetail()" class="p-2 hover:bg-slate-100 rounded-full text-slate-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 overflow-y-auto flex-1">
                <div class="mb-6">
                    <label class="text-xs font-bold text-slate-400 uppercase">URL de la API</label>
                    <p id="modalUrl" class="text-sm font-medium text-blue-600 break-all bg-blue-50 p-3 rounded-lg mt-1"></p>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Cuerpo / Respuesta (JSON)</label>
                    <pre id="modalContent" class="mt-2 text-xs bg-slate-900 text-emerald-400 p-4 rounded-xl overflow-x-auto font-mono"></pre>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <script>
        let table;
        $(document).ready(function() {
            table = $('#apiTable').DataTable({
                ajax: '/api/traffic',
                columns: [
                    { data: 'hora', className: 'px-4 py-3 text-slate-500 font-mono' },
                    { data: 'method', render: data => {
                        const colors = data === 'POST' ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700';
                        return `<span class="px-2 py-1 rounded text-[10px] font-bold ${colors}">${data}</span>`;
                    }},
                    { data: 'status_code', render: data => {
                        const color = data == 200 ? 'text-green-600' : 'text-red-500';
                        return `<span class="font-bold ${color}">${data || '---'}</span>`;
                    }},
                    { data: 'url', className: 'px-4 py-3 truncate max-w-xs md:max-w-md', render: data => data },
                    { data: 'id', className: 'text-center', render: data => {
                        return `<button onclick="showDetail('${data}')" class="text-blue-600 hover:text-blue-800 font-semibold text-xs">Inspeccionar</button>`;
                    }}
                ],
                order: [[0, 'desc']],
                pageLength: 15,
                dom: '<"flex justify-between p-4"f>rt<"flex justify-between p-4"ip>',
                language: { search: "", searchPlaceholder: "Buscar API..." }
            });

            // Refresco cada 5 seg
            setInterval(() => table.ajax.reload(null, false), 5000);
        });

        function showDetail(id) {
            const panel = $('#detailPanel');
            panel.removeClass('hidden').addClass('translate-x-0');
            $('#modalContent').text('Cargando...');

            $.get('/api/detail/' + id, function(data) {
                $('#modalUrl').text(data.url);
                $('#modalContent').text(JSON.stringify(data, null, 2));
            });
        }

        function closeDetail() {
            $('#detailPanel').addClass('translate-x-full');
            setTimeout(() => $('#detailPanel').addClass('hidden'), 300);
        }
    </script>
</body>
</html>
