<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imnd ugud | Traffic Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <style>
        .dataTables_wrapper .dataTables_filter { display: none; } /* Ocultamos el buscador por defecto */
        .dataTables_wrapper .dataTables_paginate .paginate_button.current {
            background: #3b82f6 !important; color: white !important; border: none !important; border-radius: 0.5rem;
        }
        pre { white-space: pre-wrap; word-wrap: break-word; word-break: break-all; }
        pre::-webkit-scrollbar { width: 6px; height: 6px; }
        pre::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        mark { background-color: #fbbf24; color: #000; border-radius: 2px; }
        .filter-input {
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }
        .filter-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">

    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 sticky top-0 z-40">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-200">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-slate-800">Traffic Analyzer</h1>
            </div>
            <div id="status-indicator" class="flex items-center gap-2 text-xs font-semibold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-100">
                <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></span>
                LIVE CAPTURE
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Filtrar por URL / Endpoint</label>
                <input type="text" id="filterUrl" class="filter-input w-full px-3 py-2 rounded-lg text-sm outline-none" placeholder="Ej: /api/v1/user...">
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <label class="text-[10px] font-bold text-amber-500 uppercase mb-2 block">Buscar en Contenido Request</label>
                <input type="text" id="filterRequest" class="filter-input w-full px-3 py-2 rounded-lg text-sm outline-none" placeholder="Ej: user_id, token...">
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <label class="text-[10px] font-bold text-emerald-500 uppercase mb-2 block">Buscar en Contenido Response</label>
                <input type="text" id="filterResponse" class="filter-input w-full px-3 py-2 rounded-lg text-sm outline-none" placeholder="Ej: success, balance...">
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/60 border border-slate-200 overflow-hidden">
            <div class="p-6">
                <table id="apiTable" class="w-full text-left text-sm border-separate border-spacing-y-0">
                    <thead class="bg-slate-50 text-slate-500 uppercase text-[10px] font-bold tracking-widest">
                        <tr>
                            <th class="px-4 py-4 border-b border-slate-100">Timestamp</th>
                            <th class="px-4 py-4 border-b border-slate-100">Method</th>
                            <th class="px-4 py-4 border-b border-slate-100">Status</th>
                            <th class="px-4 py-4 border-b border-slate-100">Endpoint</th>
                            <th class="px-4 py-4 border-b border-slate-100 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="detailPanel" class="fixed inset-y-0 right-0 w-full max-w-2xl bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-50 border-l border-slate-200 hidden">
        <div class="h-full flex flex-col">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <div><h2 class="text-lg font-bold text-slate-800 tracking-tight">Request Details</h2><p class="text-[10px] text-slate-400 font-mono uppercase mt-1" id="requestIdLabel"></p></div>
                <button onclick="closeDetail()" class="p-2 hover:bg-slate-200 rounded-full transition-colors text-slate-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="p-6 overflow-y-auto flex-1 space-y-6">
                <div id="typeBadges" class="flex flex-wrap gap-2"></div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">API Endpoint</label>
                    <p id="modalUrl" class="text-xs font-mono text-blue-700 break-all bg-blue-50/50 p-3 rounded-xl border border-blue-100"></p>
                </div>
                <div class="space-y-2">
                    <div class="flex justify-between items-center"><label class="text-[10px] font-black text-amber-500 uppercase tracking-tighter italic">Request Body</label><button onclick="copyRaw('modalRequest')" class="text-[9px] bg-amber-50 text-amber-600 px-2 py-1 rounded border border-amber-200 font-bold hover:bg-amber-100 uppercase">Copiar</button></div>
                    <pre id="modalRequest" class="text-[11px] bg-slate-800 text-amber-200 p-4 rounded-xl font-mono max-h-[250px] border border-slate-700 overflow-y-auto"></pre>
                </div>
                <div class="space-y-2">
                    <div class="flex justify-between items-center"><label class="text-[10px] font-black text-emerald-500 uppercase tracking-tighter italic">Response Body</label><button onclick="copyRaw('modalResponse')" class="text-[9px] bg-emerald-50 text-emerald-600 px-2 py-1 rounded border border-emerald-200 font-bold hover:bg-emerald-100 uppercase">Copiar</button></div>
                    <pre id="modalResponse" class="text-[11px] bg-slate-900 text-emerald-400 p-4 rounded-xl font-mono max-h-[400px] border border-slate-800 shadow-inner overflow-y-auto"></pre>
                </div>
            </div>
        </div>
    </div>

    <div id="overlay" onclick="closeDetail()" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300"></div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <script>
        let table;
        let originalTexts = { modalRequest: "", modalResponse: "" };

        $(document).ready(function() {
            // Lógica de filtrado personalizado para Request y Response
            $.fn.dataTable.ext.search.push(function(settings, data, dataIndex) {
                const row = table.row(dataIndex).data();
                const filterUrl = $('#filterUrl').val().toLowerCase();
                const filterReq = $('#filterRequest').val().toLowerCase();
                const filterRes = $('#filterResponse').val().toLowerCase();

                const matchUrl = row.url.toLowerCase().includes(filterUrl);
                const matchReq = (row.request_body || "").toLowerCase().includes(filterReq);
                const matchRes = (row.response_body || "").toLowerCase().includes(filterRes);

                return matchUrl && matchReq && matchRes;
            });

            table = $('#apiTable').DataTable({
                ajax: '/api/traffic',
                columns: [
                    { data: 'hora', className: 'px-4 py-4 text-slate-500 font-mono text-[11px]' },
                    { data: 'method', render: data => {
                        const style = data === 'POST' ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700';
                        return `<span class="px-2 py-1 rounded-md text-[9px] font-black tracking-widest ${style}">${data}</span>`;
                    }},
                    { data: 'status_code', render: data => {
                        const color = data >= 200 && data < 300 ? 'text-emerald-600' : 'text-rose-500';
                        return `<span class="font-bold font-mono ${color}">${data || '---'}</span>`;
                    }},
                    { data: 'url', className: 'px-4 py-4 max-w-[300px] md:max-w-md truncate font-medium text-slate-600' },
                    { data: 'id', className: 'text-center', render: data => `<button onclick="showDetail('${data}')" class="bg-slate-100 hover:bg-blue-600 hover:text-white text-slate-600 px-3 py-1.5 rounded-lg text-[11px] font-bold transition-all uppercase tracking-tighter">Inspect</button>` }
                ],
                order: [[0, 'desc']],
                pageLength: 20,
                dom: 'rtip', // Ocultamos el buscador nativo
                language: { info: "Mostrando _START_ a _END_ de _TOTAL_ peticiones" }
            });

            // Disparar filtrado al escribir en los inputs de arriba
            $('#filterUrl, #filterRequest, #filterResponse').on('keyup', function() {
                table.draw();
            });

            setInterval(() => table.ajax.reload(null, false), 5000);
        });

        function showDetail(id) {
            const panel = $('#detailPanel');
            const overlay = $('#overlay');
            panel.removeClass('hidden'); overlay.removeClass('hidden');
            setTimeout(() => { panel.addClass('translate-x-0'); overlay.addClass('opacity-100'); }, 10);

            $.get('/api/detail/' + id, function(data) {
                $('#requestIdLabel').text('ID: ' + id);
                $('#modalUrl').text(data.url);
                originalTexts.modalRequest = data.request_body || '// Sin datos enviados';
                originalTexts.modalResponse = data.response_body || '// Sin respuesta capturada';
                $('#modalRequest').text(originalTexts.modalRequest);
                $('#modalResponse').text(originalTexts.modalResponse);
                $('#typeBadges').html(`<span class="bg-slate-800 text-white text-[9px] px-2 py-1 rounded font-bold uppercase">Status: ${data.status_code || '??'}</span>`);
            });
        }

        function closeDetail() {
            $('#detailPanel').removeClass('translate-x-0');
            $('#overlay').removeClass('opacity-100');
            setTimeout(() => { $('#detailPanel').addClass('hidden'); $('#overlay').addClass('hidden'); }, 300);
        }

        function copyRaw(id) {
            navigator.clipboard.writeText(originalTexts[id]);
            alert('Copiado al portapapeles');
        }
    </script>
</body>
</html>
